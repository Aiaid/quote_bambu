services:
  bambu_cc:
    image: ghcr.io/aiaid/quote_bambu:latest
    container_name: bambu_cc
    restart: always
    pull_policy: always
    env_file:
      - .env

  # --- Local dev: bind-mount sources, install deps inline. ---
  # Use with:  docker compose --profile dev up bambu_cc_dev
  bambu_cc_dev:
    profiles: [dev]
    image: python:3.12-slim
    container_name: bambu_cc_dev
    restart: "no"
    working_dir: /app
    volumes:
      - ./fetch_bambu.py:/app/fetch_bambu.py:ro
      - ./camera.py:/app/camera.py:ro
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        set -e
        apt-get update
        apt-get install -y --no-install-recommends ffmpeg ca-certificates fonts-dejavu-core
        rm -rf /var/lib/apt/lists/*
        pip install --no-cache-dir \
          -i https://mirrors.aliyun.com/pypi/simple/ \
          --trusted-host mirrors.aliyun.com \
          paho-mqtt requests pillow
        exec python -u fetch_bambu.py
